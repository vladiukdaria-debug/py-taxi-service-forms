{% extends "base.html" %}

{% load crispy_forms_filters %}

{% block content %}
  <h1>Car Form</h1>

  <form method="post" novalidate>
    {% csrf_token %}
    {{ form|crispy }}

    <input
      type="submit"
      value="Submit"
      class="btn btn-primary"
    >

    <a
      href="#"
      onclick="history.back(); return false;"
      class="btn btn-secondary"
    >
      Cancel
    </a>
  </form>
{% endblock %}
